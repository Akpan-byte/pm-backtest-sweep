name: baseline-0s
on:
  workflow_dispatch:
jobs:
  baseline:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        strategy:
          - tf_dema_lb20_dev002_emax85_alp0001
          - tf_vwap_ticks_lb50_dev002_emax80
          - tf_holt_lb50_dev002_emax85_alp0002_hol0005
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install numpy pandas pyarrow
      - run: tar xzf sample_2k.tar.gz
      - name: Run 0s baseline
        run: python3 sweep_entry_timing.py --strategy "${{ matrix.strategy }}" --subsample 1 --windows 0
      - uses: actions/upload-artifact@v4
        with:
          name: baseline-${{ matrix.strategy }}
          path: sweep_*.json
