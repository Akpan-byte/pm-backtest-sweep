# CHANGE_SUMMARY
# 2026-07-18  kilo
#   - Tests flip-on-filter strategy: when regime filter blocks a trade,
#     take the opposite direction instead of skipping.
#   - Runs 5 flip variants on 2k sample IS data.
# WHY: Previous regime filters reduced trade count but hurt PnL and increased
#      drawdown. If the filter has negative predictive power, flipping could
#      capture the opposite edge.
name: flip_test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  flip-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        variant:
          - tf_dema_lb20_dev002_emax85_alp0001_rV1_flip
          - tf_vwap_ticks_lb50_dev002_emax80_rV1_flip
          - tf_dema_lb20_dev002_emax85_alp0002_rV1_flip
          - tf_alma_lb50_dev002_emax80_alm0075_alm6_rV1_flip
          - tf_holt_lb50_dev002_emax85_alp0002_hol0005_rV1_flip

    name: flip-${{ matrix.variant }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract 2k sample dataset
        run: |
          tar -xzf sample_2k.tar.gz --strip-components=1 -C /tmp
          ls -ld /tmp/btc5m_compact
          wc -l is_files_2k.txt

      - name: Run flip backtest for ${{ matrix.variant }}
        env:
          BT_EXTRA_STRATEGIES: flip_registry.json
          BT_ONLY_EXTRA_REGISTRY: "1"
          BT_IS_DIR: flip_test
        run: |
          mkdir -p results/flip_test
          python3 run_is.py \
            --files is_files_2k.txt \
            --workers 4 \
            --only "${{ matrix.variant }}" \
            --compact \
            --fill taker

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: flip-${{ matrix.variant }}
          path: results/flip_test/${{ matrix.variant }}.*
          if-no-files-found: ignore

  # Also run the baseline (no filter) and rV1 (with filter) for comparison
  comparison-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract 2k sample dataset
        run: |
          tar -xzf sample_2k.tar.gz --strip-components=1 -C /tmp
          ls -ld /tmp/btc5m_compact
          wc -l is_files_2k.txt

      - name: Run baseline (no filter)
        env:
          BT_EXTRA_STRATEGIES: trend_sweep_registry.json
          BT_IS_DIR: flip_test
        run: |
          mkdir -p results/flip_test
          python3 run_is.py \
            --files is_files_2k.txt \
            --workers 4 \
            --only "tf_dema_lb20_dev002_emax85_alp0002" \
            --compact \
            --fill taker

      - name: Run rV1 (with filter, no flip)
        env:
          BT_EXTRA_STRATEGIES: trend_regime_registry.json
          BT_ONLY_EXTRA_REGISTRY: "1"
          BT_IS_DIR: flip_test
        run: |
          python3 run_is.py \
            --files is_files_2k.txt \
            --workers 4 \
            --only "tf_dema_lb20_dev002_emax85_alp0002_rV1" \
            --compact \
            --fill taker

      - name: Upload comparison results
        uses: actions/upload-artifact@v4
        with:
          name: flip-comparison
          path: results/flip_test/tf_dema_lb20_dev002_emax85_alp0002*
          if-no-files-found: ignore

  # Merge and compare all results
  merge-results:
    runs-on: ubuntu-latest
    needs: [flip-backtest, comparison-baseline]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Compare flip vs baseline vs filtered
        run: |
          echo "=== Flip Strategy Comparison ==="
          echo ""
          for dir in all-results/*/; do
            name=$(basename "$dir")
            summary=$(find "$dir" -name "*.summary.json" | head -1)
            if [ -n "$summary" ]; then
              echo "--- $name ---"
              python3 -c "
          import json
          with open('$summary') as f:
              s = json.load(f)
          print(f\"  Trades: {s.get('n_trades', 0):,}\")
          print(f\"  PnL: \${s.get('total_pnl', 0):,.0f}\")
          print(f\"  MaxDD: {s.get('max_dd_pct', 0):.1f}%\")
          print(f\"  Sharpe: {s.get('sharpe_per_trade', 0):.4f}\")
          print(f\"  Win Rate: {s.get('win_rate', 0)*100:.1f}%\")
          print(f\"  Profit Factor: {s.get('profit_factor', 'N/A')}\")
          "
              echo ""
            fi
          done
