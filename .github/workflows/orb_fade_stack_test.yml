name: BTC ORB Fade Stack + DEMA Portfolio Test

on: workflow_dispatch

env:
  BTC_COMPACT_DIR: /tmp/btc5m_compact
  BTC_RAW_DIR: /tmp/btc5m_all
  REF_BN_DIR: /tmp/ref_btc_1m
  BACKTEST_DIR: backtest

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install numpy pandas requests redis zstandard scipy

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Download BTC 5m + Binance reference + DEMA trades (PARALLEL)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ${{ env.BTC_RAW_DIR }} ${{ env.REF_BN_DIR }} dl
          rclone copy gdrive:polybacktest_60d/polymarket/btc/5m/ ${{ env.BTC_RAW_DIR }}/ --transfers 16 --checkers 32 --fast-list &
          rclone copy gdrive:trading_backtest/reference/binance/btc/spot/klines_1m/ ${{ env.REF_BN_DIR }}/ --transfers 16 --fast-list &
          gh release download quant-data-v1 --repo "${{ github.repository }}" --pattern "trades-part4.tar.gz" --dir dl/ &
          wait
          echo "raw: $(ls ${{ env.BTC_RAW_DIR }} | wc -l) ref: $(ls ${{ env.REF_BN_DIR }} | wc -l) dl: $(ls dl/ | wc -l)"

      - name: Compactify + Build index + Extract DEMA (PARALLEL)
        working-directory: ${{ env.BACKTEST_DIR }}
        run: |
          python3 compactify.py &
          python3 extract_dema.py &
          wait
          rm -rf dl/
          python3 build_index_coin_compact.py btc ${{ env.BTC_COMPACT_DIR }} is_index_compact.json.gz --workers 3
          ls ${{ env.BTC_COMPACT_DIR }}/*.pkl.gz > /tmp/is_files_btc_compact.txt
          echo "compact: $(wc -l < /tmp/is_files_btc_compact.txt)"

      - name: Run 6 orb_fade legs IS backtest (PARALLEL)
        working-directory: ${{ env.BACKTEST_DIR }}
        env:
          BT_IS_DIR: is_bn
          BT_REF_BTC_1M_DIR: ${{ env.REF_BN_DIR }}
          BT_REF_FEED: binance
          PM_BOOK_DIR: ${{ env.BTC_RAW_DIR }}
        run: |
          run_leg() {
            local LEG=$1
            local REGISTRY=coin_full_registry_${LEG}.json
            python3 -c "
          import json
          LEG='${LEG}'
          BASES={
            'b1m_liqpull40':{'tf_hint':'1m','or_sec':60,'filter':{'feat':'PM_liq_pull20','op':'<','thr':40}},
            'b1m_imbslope30':{'tf_hint':'1m','or_sec':60,'filter':{'feat':'PM_imb_slope20','op':'<','thr':30}},
            'b1m_chand40':{'tf_hint':'1m','or_sec':60,'filter':{'feat':'IND_chand22_1d','op':'>','thr':40}},
            'l5m_mom30':{'tf_hint':'5m','or_sec':120,'filter':{'feat':'IND_mom30_1d','op':'<','thr':80}},
            'l5m_liqpull60':{'tf_hint':'5m','or_sec':120,'filter':{'feat':'PM_liq_pull20','op':'<','thr':60}},
            'l3m_bbpct40':{'tf_hint':'3m','or_sec':180,'filter':{'feat':'IND_bbpct20_1d','op':'>','thr':40}},
          }
          b=BASES[LEG]
          with open('${REGISTRY}','w') as f:
            json.dump({f'btc_{LEG}':{'module':'phase_2.daily_orb_v5','fn':'daily_orb_v5_signal',
              'params':['spot_price','asset','rem_sec','yp','np_val','yes_ask','no_ask','tf_hint','market_id','max_reentries','or_window_seconds'],
              'tf_hint':b['tf_hint'],'or_window_seconds':b['or_sec'],
              'max_reentries':5,'_max_reentries':5,
              'allow_reentry':True,'asset':'BTC','_orb_fade_leg':LEG,'_filter':b['filter']}},f,indent=2)
          "
            BT_EXTRA_STRATEGIES=${REGISTRY} \
              BT_ONLY_EXTRA_REGISTRY=1 \
              python3 run_is.py --files /tmp/is_files_btc_compact.txt --workers 2 --compact --fill taker 2>&1
            python3 apply_orb_fade_filters.py --leg $LEG 2>&1
            echo "=== Done $LEG ==="
          }

          for LEG in b1m_liqpull40 b1m_imbslope30 b1m_chand40 l5m_mom30 l5m_liqpull60 l3m_bbpct40; do
            run_leg $LEG &
          done

          FAIL=0
          for pid in $(jobs -p); do
            wait "$pid" || FAIL=1
          done
          if [ $FAIL -ne 0 ]; then
            echo "ERROR: One or more backtest legs failed"
            exit 1
          fi
          echo "=== ALL 6 LEGS COMPLETE ==="

      - name: Combine 6 legs into shared-wallet stack
        working-directory: ${{ env.BACKTEST_DIR }}
        run: python3 combine_orb_fade_full_stack.py results/is_bn

      - name: Run quant suite on all 6 legs
        working-directory: ${{ env.BACKTEST_DIR }}
        env:
          BT_IS_DIR: is_bn
          BT_Q_DIR: quant_bn
        run: python3 quant_suite.py --only btc_b1m_liqpull40,btc_b1m_imbslope30,btc_b1m_chand40,btc_l5m_mom30,btc_l5m_liqpull60,btc_l3m_bbpct40 --workers 8 --fill taker

      - name: Portfolio comparison (stack alone vs stack+DEMA)
        working-directory: ${{ env.BACKTEST_DIR }}
        run: |
          python3 compare_stack.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orb-fade-stack-results
          path: |
            backtest/results/is_bn/
            backtest/results/quant_bn/
            backtest/reports/
            stack_comparison.json
            backtest/dema_trades.csv
          retention-days: 3
