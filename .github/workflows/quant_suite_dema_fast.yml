name: Quant Suite 20k DEMA (Fast)

on: workflow_dispatch

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install numpy
        run: pip install numpy

      - name: Extract DEMA PnLs + run quant suite
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dl

          echo "=== Disk before download ==="
          df -h /

          echo "=== Downloading tarballs ==="
          gh release download quant-data-v1 --repo "${{ github.repository }}" --pattern "*.tar.gz" --dir dl/

          echo "=== Disk after download ==="
          df -h /

          echo "=== Streaming DEMA PnLs directly from tarballs (no disk extraction) ==="
          TARGET="tf_dema_lb20_dev002_emax85_alp0001.trades.jsonl.gz"

          python3 -c "
          import tarfile, gzip, json, os, sys
          import numpy as np

          STRATEGY_FILE = '$TARGET'
          pnls = []

          for part in range(1, 6):
              tgz = f'dl/trades-part{part}.tar.gz'
              if not os.path.exists(tgz):
                  continue
              print(f'Scanning {tgz}...', flush=True)
              with tarfile.open(tgz, 'r:gz') as tar:
                  for member in tar:
                      if member.name.endswith(STRATEGY_FILE) and 'rV' not in member.name and 'rC' not in member.name and 'rD' not in member.name:
                          print(f'  Found: {member.name}', flush=True)
                          fobj = tar.extractfile(member)
                          if fobj is None:
                              continue
                          count = 0
                          with gzip.open(fobj, 'rt', errors='replace') as gz:
                              for line in gz:
                                  try:
                                      pnls.append(float(json.loads(line)['pnl']))
                                      count += 1
                                  except:
                                      continue
                          print(f'  Loaded {count} trades', flush=True)
                          break  # only need one file per tarball

          if not pnls:
              print('ERROR: No trades found!', flush=True)
              sys.exit(1)

          arr = np.array(pnls, dtype=np.float64)
          np.save('dema_pnls.npy', arr)
          print(f'Total: {len(arr)} trades ({arr.nbytes/1048576:.1f} MB)', flush=True)
          "

          echo "=== Disk after extraction ==="
          df -h /

          echo "=== Cleaning up tarballs to free disk ==="
          rm -rf dl/

          echo "=== Running quant suite ==="
          python3 quant_suite_full.py
