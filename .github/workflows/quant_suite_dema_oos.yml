name: Quant Suite 20k DEMA OOS

on: workflow_dispatch

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install numpy scipy
        run: pip install numpy scipy

      - name: Extract DEMA OOS PnLs + run quant suite
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dl
          echo "=== Downloading tarballs ==="
          gh release download quant-data-v1 --repo "${{ github.repository }}" --pattern "*.tar.gz" --dir dl/
          df -h /
          echo "=== Running OOS quant suite ==="
          python3 quant_suite_oos.py
          echo "=== Cleaning up ==="
          rm -rf dl/
