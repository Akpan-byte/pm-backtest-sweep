name: screen

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        strategy:
          - prob_convexity_fade
          - prob_convexity_trend
          - expiry_convergence_90_300
          - expiry_pin_guard
          - spot_shock_overreaction
          - topbook_imbalance_rate
          - time_of_day_bias
          - adaptive_lookback_vol
          - vol_compression_breakout
          - kalman_signal_filter
          - noise_signal_decomp
          - kronos_5m_filter
          - kronos_agreement_sizing
          - spot_above_strike_yes
          - spot_below_strike_no
          - momentum_5t_yes
          - momentum_5t_no
          - mean_reversion_5t_yes
          - mean_reversion_5t_no
          - yes_extreme_fade
          - no_extreme_fade
          - opening_momentum
          - closing_fade
          - volatility_breakout_yes
          - volatility_breakout_no
          - book_pressure_yes
          - book_pressure_no
          - strike_distance_yes
          - strike_distance_no
          - delayed_momentum_yes
          - delayed_momentum_no
          - high_vol_fade
          - low_vol_breakout_yes
          - consecutive_yes
          - consecutive_no
        fill: [taker, maker]

    name: screen-${{ matrix.strategy }}-${{ matrix.fill }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract 2k sample dataset
        run: |
          tar -xzf sample_2k.tar.gz --strip-components=1 -C /tmp
          ls -ld /tmp/btc5m_compact
          wc -l is_files_2k.txt

      - name: Run backtest for ${{ matrix.strategy }} (${{ matrix.fill }})
        env:
          BT_EXTRA_STRATEGIES: new_strategy_registry.json
          BT_IS_DIR: is_${{ matrix.fill }}
        run: |
          mkdir -p results/is_${{ matrix.fill }}
          python3 run_is.py \
            --files is_files_2k.txt \
            --workers 4 \
            --only ${{ matrix.strategy }} \
            --compact \
            --fill ${{ matrix.fill }}

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.strategy }}-${{ matrix.fill }}
          path: results/is_${{ matrix.fill }}/${{ matrix.strategy }}.summary.json
          if-no-files-found: error

      - name: Upload trades artifact
        uses: actions/upload-artifact@v4
        with:
          name: trades-${{ matrix.strategy }}-${{ matrix.fill }}
          path: results/is_${{ matrix.fill }}/${{ matrix.strategy }}.trades.jsonl.gz
          if-no-files-found: warn
