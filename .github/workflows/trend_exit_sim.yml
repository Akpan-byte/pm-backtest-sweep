name: Trend-Family Early-Exit Simulation

on:
  workflow_dispatch:
    inputs:
      legs:
        description: "Comma-separated leg names to run (default: all 5 top legs)"
        required: false
        default: "tf_dema_lb20_dev002_emax85_alp0001,tf_vwap_ticks_lb50_dev002_emax80,tf_dema_lb20_dev002_emax85_alp0002,tf_alma_lb50_dev002_emax80_alm0075_alm6,tf_holt_lb50_dev002_emax85_alp0002_hol0005"

jobs:
  simulate-leg:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leg:
          - tf_dema_lb20_dev002_emax85_alp0001
          - tf_vwap_ticks_lb50_dev002_emax80
          - tf_dema_lb20_dev002_emax85_alp0002
          - tf_alma_lb50_dev002_emax80_alm0075_alm6
          - tf_holt_lb50_dev002_emax85_alp0002_hol0005
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Install rclone
        run: |
          curl -sL https://downloads.rclone.org/rclone-current-linux-amd64.zip -o rclone.zip
          unzip -q rclone.zip
          mv rclone-*-linux-amd64/rclone /usr/local/bin/rclone
          chmod +x /usr/local/bin/rclone
          mkdir -p ~/.config/rclone
          printf '%s' "${{ secrets.RCLONE_CONFIG_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Pull needed snapshots from gdrive
        run: |
          mkdir -p backtest/data/polybacktest_real/snapshots
          python3 - <<'PY'
          import gzip, json, os
          leg = "${{ matrix.leg }}"
          needed = set()
          with gzip.open(f"backtest/data/trend_exits/trades/{leg}.trades.jsonl.gz", "rt") as f:
              for line in f:
                  needed.add(json.loads(line)["condition_id"])
          os.makedirs("backtest/data/polybacktest_real", exist_ok=True)
          with open("backtest/data/polybacktest_real/files_from.txt", "w") as f:
              for mid in sorted(needed):
                  f.write(f"{mid}.json.gz\n")
          print(f"{leg}: {len(needed)} snapshots needed")
          PY
          cd backtest/data/polybacktest_real
          rclone copy --files-from files_from.txt gdrive:polybacktest_60d/polymarket/btc/5m/ snapshots/ --transfers 16 --checkers 64

      - name: Run exit simulation
        run: |
          cd backtest
          python3 -u trend_family_exit_sim.py \
            --legs "${{ matrix.leg }}" \
            --snapshot-dir data/polybacktest_real/snapshots \
            --workers 4 \
            --output-json "data/polybacktest_real/results/${{ matrix.leg }}.json"

      - name: Upload per-leg result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.leg }}-result
          path: backtest/data/polybacktest_real/results/${{ matrix.leg }}.json

  merge-report:
    runs-on: ubuntu-latest
    needs: simulate-leg
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: backtest/data/polybacktest_real/results
          pattern: "*-result"

      - name: Merge results and write report
        run: |
          cd backtest
          python3 - <<'PY'
          import json, glob
          from pathlib import Path
          from trend_family_exit_sim import print_table, best_rule, REPORT_DIR, build_rules

          files = glob.glob("data/polybacktest_real/results/*-result/*.json")
          all_results = {}
          for f in files:
              with open(f) as fh:
                  data = json.load(fh)
              all_results.update(data.get("results", {}))

          REPORT_DIR.mkdir(parents=True, exist_ok=True)
          report_path = REPORT_DIR / "trend_family_exit_report.md"
          with open(report_path, "w") as fh:
              fh.write("# Trend-Family Early-Exit Simulation Report (GitHub Actions)\n\n")
              for leg in sorted(all_results):
                  fh.write(print_table(leg, all_results[leg]) + "\n")
              fh.write("\n## Best rule per leg\n\n")
              fh.write("| leg | best_rule | total_pnl | max_dd | win_rate | profit_factor |\n")
              fh.write("|-----|-----------|-----------|--------|----------|---------------|\n")
              for leg in sorted(all_results):
                  best, m = best_rule(all_results[leg])
                  fh.write(f"| {leg} | {best} | {m['total_pnl']:.2f} | {m['max_dd']:.2f} | {m['win_rate']*100:.2f}% | {m['profit_factor']:.4f} |\n")
          print(f"Report written to {report_path}")
          PY

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: trend-family-exit-report
          path: backtest/reports/trend_family_exit_report.md
