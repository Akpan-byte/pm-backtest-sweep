#   - Upload workflow: tarballs trade files and creates a GitHub release for GHA consumption.
name: upload_trades

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        default: 'quant-data'

runs-on: ubuntu-latest
timeout-minutes: 120
steps:
  - uses: actions/checkout@v4

  - name: Download trade artifact from local via release
    run: |
      echo "This workflow uploads trade files to a GitHub release."
      echo "Trigger from the VM with the trade files."

  - name: Create release and upload
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      set -euo pipefail
      TAG="${{ inputs.tag }}"
      
      # Create release
      gh release create "$TAG" \
        --repo "${{ github.repository }}" \
        --title "Quant trade data" \
        --notes "Trade files for parallel quant analysis" \
        --latest=false || true
      
      echo "Release $TAG ready. Upload files manually or use this workflow."
